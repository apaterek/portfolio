<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KSA</title>

<!-- Shared reveal system (single source, no drift): tokens + reveal. -->
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/reveal.css">
<script src="assets/js/reveal.js"></script>
</head>
<body class="reveal">

  <div class="hint" id="hint">Click Anywhere</div>

  <div class="stage">
    <div class="line above" id="above"></div>
    <div class="frame">
      <video autoplay muted loop playsinline preload="auto"
             poster="media/video/web/ksa-water-poster.jpg">
        <source src="media/video/web/ksa-water-loop.mp4" type="video/mp4">
      </video>
    </div>
    <div class="line below" id="below"></div>
  </div>

  <script>
    // Reveal order reads top-to-bottom: KINDA SORTA ALMOST IS / SORTA ALMOST READY.
    // One token per click; after all 8 appear, further clicks cycle the colour of
    // both lines through the shared 9-colour palette.
    var tokens = [
      { t: 'KINDA',  line: 'above' },
      { t: 'SORTA',  line: 'above' },
      { t: 'ALMOST', line: 'above' },
      { t: 'IS',     line: 'above' },
      { t: 'SORTA',  line: 'below' },
      { t: 'ALMOST', line: 'below' },
      { t: 'READY',  line: 'below' },
      { t: '.',      line: 'below', punct: true }
    ];

    var aboveEl = document.getElementById('above');
    var belowEl = document.getElementById('below');

    var spans = tokens.map(function (tok) {
      var s = document.createElement('span');
      s.className = 'word' + (tok.punct ? ' punct' : '');
      s.textContent = tok.t;
      (tok.line === 'above' ? aboveEl : belowEl).appendChild(s);
      return s;
    });

    KSAReveal.fitToFrame(document.querySelector('.stage'), [aboveEl, belowEl]);
    var nextColor = KSAReveal.makeColorCycler(3);

    var N = tokens.length, clicks = 0;
    document.addEventListener('click', function () {
      if (clicks < N) {
        spans[clicks].classList.add('show');
      } else {
        document.documentElement.style.setProperty('--text-color', nextColor());
      }
      clicks++;
    });
  </script>

</body>
</html>
