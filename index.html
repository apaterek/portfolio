<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Austin Paterek</title>

<!-- Shared design system: tokens + header/nav (base) + reveal hero. -->
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/reveal.css">
<script src="assets/js/reveal.js"></script>
<style>
  /* Header is revealed only on the final click. Hidden (and non-interactive)
     until then so it can't catch the reveal clicks. */
  .site-header { opacity: 0; visibility: hidden; transition: opacity 0.5s ease; }
  .site-header.show { opacity: 1; visibility: visible; }

  /* Word revealed centered OVER the looping water, one per click. Homepage-only
     override: no outline stroke around the video (reveal.css's shared .frame
     border stays intact for construction.html). */
  .frame { position: relative; border: none; }
  .overword {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 16px;
    pointer-events: none;
  }
  /* Colour comes from the shared 9-colour palette, set per word by JS.
     Style over legibility: no shadow, no scrim. */
  .overword .ow-word {
    font-weight: 700;
    font-size: clamp(32px, 7vw, 80px);
    line-height: 1;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    animation: owPop 0.3s ease both;
  }
  @keyframes owPop {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: none; }
  }

  /* Final state ("done"): the stack shifts up under the header and the photo
     gallery flows below the video. */
  body.reveal.done {
    justify-content: flex-start;
    padding-top: 200px;
    padding-bottom: 80px;
  }

  /* Photo gallery below the water loop. Wider than the video (which stays
     centered/unchanged); images vary in size but are never taller than the
     video, and each is nudged left/right (arrhythmic). No strokes. Appears
     with the header on the final click. */
  .more {
    display: none;
    width: min(1120px, 96vw);
    margin-top: 44px;
  }
  body.reveal.done .more { display: block; animation: fadeUp 0.5s ease both; }
  .more img {
    display: block;
    height: calc(var(--video-h, 400px) * var(--ihf, 0.8));   /* never taller than the video */
    width: auto;
    margin: 0 auto 46px;                     /* centered on the video's axis */
    transform: translateX(var(--sx, 0px));   /* arrhythmic left/right nudge (JS) */
  }
  .more img:last-child { margin-bottom: 0; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }

  @media (max-width: 900px) {
    body.reveal.done { padding-top: 150px; }
  }
</style>
</head>
<body class="reveal">

  <header class="container site-header" id="site-header">
    <h1 class="site-title">
      <span>AUSTIN</span>
      <span class="indent">PATEREK</span>
    </h1>
    <nav>
      <ul>
        <li class="active" data-text="Home"><a href="index.html">Home</a></li>
        <li data-text="About"><a href="about.html">About</a></li>
        <li data-text="Work"><a href="work.html">Work</a></li>
        <li data-text="Writing"><a href="writing.html">Writing</a></li>
        <li data-text="Contact"><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <div class="hint" id="hint">Click Anywhere</div>

  <!-- The video is the constraint: centered, fixed size, unchanged. -->
  <div class="stage">
    <div class="frame">
      <video autoplay muted loop playsinline preload="auto"
             poster="media/video/web/ksa-water-poster.jpg">
        <source src="media/video/web/ksa-water-loop.mp4" type="video/mp4">
      </video>
      <div class="overword" id="overword" aria-hidden="true"></div>
    </div>
  </div>

  <!-- Photo gallery. Varied heights (--ihf, fraction of the video height);
       JS sets the left/right nudge (--sx) and the live --video-h. -->
  <div class="more" id="more">
    <img loading="lazy" alt="" style="--ihf:0.80" src="media/images/instagram/ig-20130717-17842879720039811.jpg">
    <img loading="lazy" alt="" style="--ihf:0.92" src="media/images/instagram/ig-20180831-17876140687266239.jpg">
    <img loading="lazy" alt="" style="--ihf:0.70" src="media/images/instagram/ig-20181106-17970404773133779.jpg">
    <img loading="lazy" alt="" style="--ihf:0.85" src="media/images/instagram/ig-20201031-17898995464612752.jpg">
    <img loading="lazy" alt="" style="--ihf:0.95" src="media/images/instagram/ig-20201116-17883196828869639.jpg">
    <img loading="lazy" alt="" style="--ihf:0.78" src="media/images/instagram/ig-20210318-18201525439006517.jpg">
    <img loading="lazy" alt="" style="--ihf:0.88" src="media/images/instagram/ig-20210319-17889760877017074-2.jpg">
    <img loading="lazy" alt="" style="--ihf:0.72" src="media/images/instagram/ig-20210319-17889760877017074-7.jpg">
    <img loading="lazy" alt="" style="--ihf:0.98" src="media/images/instagram/ig-20210319-17895297250922037.jpg">
    <img loading="lazy" alt="" style="--ihf:0.66" src="media/images/instagram/ig-20210319-17910450430719360.jpg">
    <img loading="lazy" alt="" style="--ihf:0.90" src="media/images/instagram/ig-20210319-17921419504536491.jpg">
    <img loading="lazy" alt="" style="--ihf:0.82" src="media/images/instagram/ig-20210418-17882382629231591.jpg">
    <img loading="lazy" alt="" style="--ihf:0.75" src="media/images/instagram/ig-20130405-17842851268039811.jpg">
  </div>

  <script>
    // The click-reveal runs once per browser session. If it already ran this
    // session, skip straight to the finished state on load: no hint flash, no
    // click needed. Navigating Home from any other page (or reloading Home)
    // during the same session lands on the finished state; a new session (e.g.
    // the browser was closed and reopened) shows the reveal again.
    var SESSION_KEY = 'ksaHomeRevealDone';
    var alreadyDone = sessionStorage.getItem(SESSION_KEY) === '1';

    var overword = document.getElementById('overword');
    var hint     = document.getElementById('hint');
    var header   = document.getElementById('site-header');

    if (alreadyDone) {
      // Applied synchronously before first paint, so there's no flash of the
      // click-anywhere / hidden-header starting state.
      header.classList.add('show');
      hint.classList.add('gone');
      document.body.classList.add('done');
    }

    // Opening is the same: "Click Anywhere" over the looping water. Then one word
    // appears centered over the video per click, in order. The click after the
    // last word removes it and, at the same moment, brings in the header and the
    // whole photo gallery.
    var words = ['CREATIVE', 'STRATEGY', 'CONTENT', 'EXPERIENCE'];

    // Each word takes a random colour from the shared 9-colour palette, using the
    // same arrhythmic rule as the rest of the site (never one of the last 3).
    var nextColor = KSAReveal.makeColorCycler(3);
    var total = words.length + 1;   // 4 words + 1 final click
    var clicks = alreadyDone ? total : 0;   // already-done: clicks are inert

    document.addEventListener('click', function () {
      if (clicks >= total) return;                       // done; nav clicks pass through
      if (clicks < words.length) {
        overword.innerHTML =
          '<span class="ow-word" style="color:' + nextColor() + '">' + words[clicks] + '</span>';
      } else {
        overword.innerHTML = '';                         // remove the last word
        header.classList.add('show');                    // ...header appears...
        hint.classList.add('gone');
        document.body.classList.add('done');             // ...and the gallery appears.
        sessionStorage.setItem(SESSION_KEY, '1');         // remember for this session
      }
      clicks++;
    });

    // Gallery: measure the video and drive (a) --video-h so images never exceed
    // the video's height, and (b) the left/right nudge per writing.html rules
    // (alternating direction, random magnitude scaled to the video width).
    (function () {
      var frame = document.querySelector('.frame');
      var imgs = Array.prototype.slice.call(document.querySelectorAll('.more img'));
      if (!frame) return;
      var sign = Math.random() < 0.5 ? 1 : -1;
      var params = imgs.map(function (_, i) {
        if (i > 0) sign = -sign;                          // never two consecutive the same way
        return { sign: sign, factor: 0.05 + Math.random() * 0.07 };
      });
      function apply() {
        var r = frame.getBoundingClientRect();
        document.documentElement.style.setProperty('--video-h', r.height.toFixed(1) + 'px');
        imgs.forEach(function (img, i) {
          img.style.setProperty('--sx', (params[i].sign * params[i].factor * r.width).toFixed(1) + 'px');
        });
      }
      apply();
      window.addEventListener('resize', apply);
      window.addEventListener('load', apply);
    })();
  </script>

</body>
</html>
