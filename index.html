<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Austin Paterek</title>

<!-- Shared design system: tokens + header/nav (base) + reveal hero. -->
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/base.css">
<link rel="stylesheet" href="assets/css/reveal.css">
<script src="assets/js/reveal.js"></script>
<style>
  /* Header is revealed only on the final click. Hidden (and non-interactive)
     until then so it can't catch the reveal clicks. */
  .site-header { opacity: 0; visibility: hidden; transition: opacity 0.5s ease; }
  .site-header.show { opacity: 1; visibility: visible; }

  /* Final state ("done"): the reveal copy is cleared, the stack shifts up
     under the header, and the photo gallery flows below the video. */
  body.reveal.done {
    justify-content: flex-start;
    padding-top: 200px;
    padding-bottom: 80px;
  }
  body.reveal.done .line { display: none; }        /* remove all text around the video */

  /* Photo gallery below the water loop. It sits in a container wider than the
     video (which stays centered/unchanged), the images vary in size, and each
     is nudged left/right so its edge breaks past the video frame. No strokes.
     Hidden during the reveal; fades in on its own once the header appears. */
  .more {
    display: none;
    width: min(1120px, 96vw);
    margin-top: 44px;
  }
  body.reveal.done .more { display: block; animation: fadeUp 0.5s ease 0.35s both; }
  .more img {
    display: block;
    width: var(--iw, 100%);
    max-width: 100%;
    height: auto;
    margin: 0 auto 46px;                 /* centered on the video's axis */
    transform: translateX(var(--sx, 0px));   /* arrhythmic left/right nudge (JS) */
  }
  .more img:last-child { margin-bottom: 0; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }

  @media (max-width: 900px) {
    body.reveal.done { padding-top: 150px; }
  }
</style>
</head>
<body class="reveal">

  <header class="container site-header" id="site-header">
    <h1 class="site-title">
      <span>AUSTIN</span>
      <span class="indent">PATEREK</span>
    </h1>
    <nav>
      <ul>
        <li class="active" data-text="Home"><a href="index.html">Home</a></li>
        <li data-text="About"><a href="about.html">About</a></li>
        <li data-text="Work"><a href="work.html">Work</a></li>
        <li data-text="Writing"><a href="writing.html">Writing</a></li>
        <li data-text="Contact"><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <div class="hint" id="hint">Click Anywhere</div>

  <!-- The video is the constraint: centered, fixed size, unchanged. -->
  <div class="stage">
    <div class="line above" id="above"></div>
    <div class="frame">
      <video autoplay muted loop playsinline preload="auto"
             poster="media/video/web/ksa-water-poster.jpg">
        <source src="media/video/web/ksa-water-loop.mp4" type="video/mp4">
      </video>
    </div>
    <div class="line below" id="below"></div>
  </div>

  <!-- Photo gallery. Varied widths (--iw); JS sets the left/right nudge (--sx). -->
  <div class="more" id="more">
    <img loading="lazy" alt="" style="--iw:760px" src="media/images/instagram/ig-20130405-17842851268039811.jpg">
    <img loading="lazy" alt="" style="--iw:700px" src="media/images/instagram/ig-20130717-17842879720039811.jpg">
    <img loading="lazy" alt="" style="--iw:860px" src="media/images/instagram/ig-20180831-17876140687266239.jpg">
    <img loading="lazy" alt="" style="--iw:920px" src="media/images/instagram/ig-20181106-17970404773133779.jpg">
    <img loading="lazy" alt="" style="--iw:800px" src="media/images/instagram/ig-20201031-17898995464612752.jpg">
    <img loading="lazy" alt="" style="--iw:980px" src="media/images/instagram/ig-20201116-17883196828869639.jpg">
    <img loading="lazy" alt="" style="--iw:880px" src="media/images/instagram/ig-20210318-18201525439006517.jpg">
    <img loading="lazy" alt="" style="--iw:780px" src="media/images/instagram/ig-20210319-17889760877017074-2.jpg">
    <img loading="lazy" alt="" style="--iw:840px" src="media/images/instagram/ig-20210319-17889760877017074-7.jpg">
    <img loading="lazy" alt="" style="--iw:640px" src="media/images/instagram/ig-20210319-17895297250922037.jpg">
    <img loading="lazy" alt="" style="--iw:760px" src="media/images/instagram/ig-20210319-17910450430719360.jpg">
    <img loading="lazy" alt="" style="--iw:680px" src="media/images/instagram/ig-20210319-17921419504536491.jpg">
    <img loading="lazy" alt="" style="--iw:960px" src="media/images/instagram/ig-20210418-17882382629231591.jpg">
  </div>

  <script>
    // Reveal sequence:
    //   clicks 1-4   -> top line KINDA SORTA ALMOST IS (one word each)
    //   clicks 5-10  -> below word cycles CREATIVE..AUSTIN PATEREK (9-colour cycle)
    //   click 11     -> header appears, all reveal text is removed; done.
    // The photo gallery then fades in on its own (CSS), no click required.
    var aboveWords = ['KINDA', 'SORTA', 'ALMOST', 'IS'];
    var belowWords = ['CREATIVE', 'IMAGINATION', 'CONTENT', 'EXPERIENCE', 'STRATEGY', 'AUSTIN PATEREK'];

    var aboveEl = document.getElementById('above');
    var belowEl = document.getElementById('below');
    var hint    = document.getElementById('hint');
    var header  = document.getElementById('site-header');
    var stage   = document.querySelector('.stage');

    var aboveSpans = aboveWords.map(function (w) {
      var s = document.createElement('span');
      s.className = 'word';
      s.textContent = w;
      aboveEl.appendChild(s);
      return s;
    });

    // Fit to the frame width: the full top line plus every below candidate.
    var measureEls = [aboveEl];
    belowWords.forEach(function (w) {
      var d = document.createElement('div'); d.className = 'line';
      var s = document.createElement('span'); s.className = 'word'; s.textContent = w;
      d.appendChild(s); measureEls.push(d);
    });
    KSAReveal.fitToFrame(stage, measureEls);

    var nextColor = KSAReveal.makeColorCycler(3);
    var A = aboveWords.length;               // 4 top-line reveals
    var revealClicks = A + belowWords.length; // 10; the 10th reveals AUSTIN PATEREK
    var totalClicks = revealClicks + 1;       // 11; the 11th brings in the header
    var clicks = 0;

    document.addEventListener('click', function () {
      if (clicks >= totalClicks) return;               // done; nav clicks pass through
      if (clicks < A) {
        aboveSpans[clicks].classList.add('show');       // reveal next top word
      } else if (clicks < revealClicks) {
        var word = belowWords[clicks - A];
        belowEl.innerHTML = '<span class="word show">' + word + '</span>';
        belowEl.style.color = nextColor();
      } else {
        // Separate click after the name: header in, text out, gallery follows.
        header.classList.add('show');
        hint.classList.add('gone');
        document.body.classList.add('done');
      }
      clicks++;
    });

    // Gallery askew (writing.html rules): each image nudged left/right,
    // direction strictly alternating, magnitude random and scaled to the video
    // width so image edges break past the video frame. Stable across resize.
    (function () {
      var frame = document.querySelector('.frame');
      var imgs = Array.prototype.slice.call(document.querySelectorAll('.more img'));
      if (!frame || !imgs.length) return;
      var sign = Math.random() < 0.5 ? 1 : -1;
      var params = imgs.map(function (_, i) {
        if (i > 0) sign = -sign;                       // never two consecutive the same way
        return { sign: sign, factor: 0.05 + Math.random() * 0.07 };   // 0.05..0.12 of video width
      });
      function apply() {
        var vw = frame.getBoundingClientRect().width;
        imgs.forEach(function (img, i) {
          img.style.setProperty('--sx', (params[i].sign * params[i].factor * vw).toFixed(1) + 'px');
        });
      }
      apply();
      window.addEventListener('resize', apply);
    })();
  </script>

</body>
</html>
